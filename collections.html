<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collections | FashionHaven</title>
  <style>
    /* COLLECTIONS PAGE */

.collections {
  padding: 60px 20px;
  text-align: center;
  background-color: #fdfdfd;
}

.collections h1 {
  font-size: 2.5rem;
  margin-bottom: 40px;
  color: #222;
}

.collection-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 30px;
  max-width: 1200px;
  margin: 0 auto;
}

.collection-card {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
  transition: transform 0.3s ease;
}

.collection-card:hover {
  transform: translateY(-5px);
}

.collection-card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.collection-card h3 {
  font-size: 1.4rem;
  margin: 15px 0 5px;
  color: #333;
}

.collection-card p {
  font-size: large;
  font-weight: 500;
  font-family: 'Times New Roman', Times, serif;
  color: #666;
  padding: 0 15px;
}

.collection-card .btn {
  display: inline-block;
  margin: 15px 0 20px;
  padding: 10px 20px;
  background-color: #c1121f;
  color: #fff;
  text-decoration: none;
  border-radius: 5px;
  transition: background 0.3s ease;
}

.collection-card .btn:hover {
  background-color: #a10e1a;
}

/* RESPONSIVE NAV + SHARED STYLES (if not added yet) */

header {
  background: #111;
  color: white;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
}

.logo {
  font-size: 1.6rem;
  font-weight: bold;
}

nav ul {
  display: flex;
  list-style: none;
  gap: 20px;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
}

nav a.active,
nav a:hover {
  color: #c1121f;
}
  </style>
</head>
<body>
  <header>
    <div class="logo">FashionHaven</div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="collections.html" class="active">Collections</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section class="collections">
    <h1>Seasonal & Trending Collections</h1>

    <div class="collection-grid">

      <div class="collection-card">
        <img src="images/autumn.jpg" alt="Autumn Collection">
        <h3>Autumn ‘25 Picks</h3>
        <p>Warm tones, cozy fits, seasonal favs.</p>
        <a href="cart.html"class="btn">Shop Now</a>
      </div>

      <div class="collection-card">
        <img src="images/trending.jpg" alt="Trending Collection">
        <h3>Trending Now</h3>
        <p>What’s hot this season — get the look.</p>
        <a href="products.html"class="btn">Explore</a>
      </div>

      <div class="collection-card">
        <img src="images/festive.jpg" alt="Festive Collection">
        <h3>Festive Collection</h3>
        <p>Glitz, glam, & everything extra.</p>
        <a href="cart.html"class="btn">Shop Now</a>
        
      </div>

    </div>
  </section>
</body>
</html>
